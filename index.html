
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Charm Generator</title>
    <script>
      window.addEventListener('error', function(e) {
        var diagnostics = document.getElementById('error-diagnostics') || document.createElement('div');
        diagnostics.id = 'error-diagnostics';
        diagnostics.style = 'position:fixed;bottom:20px;left:20px;right:20px;background:#7f1d1d;color:#fef2f2;padding:15px;border-radius:8px;z-index:999999;font-family:monospace;font-size:12px;max-height:50vh;overflow:auto;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);border:1px solid #f87171;';
        diagnostics.innerHTML += '<div><strong>[Error]:</strong> ' + e.message + '<br><small>' + e.filename + ':' + e.lineno + '</small></div>';
        document.body.appendChild(diagnostics);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var diagnostics = document.getElementById('error-diagnostics') || document.createElement('div');
        diagnostics.id = 'error-diagnostics';
        diagnostics.style = 'position:fixed;bottom:20px;left:20px;right:20px;background:#7f1d1d;color:#fef2f2;padding:15px;border-radius:8px;z-index:999999;font-family:monospace;font-size:12px;max-height:50vh;overflow:auto;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);border:1px solid #f87171;';
        diagnostics.innerHTML += '<div><strong>[Promise Rejection]:</strong> ' + (e.reason ? (e.reason.message || e.reason) : 'No reason') + '</div>';
        document.body.appendChild(diagnostics);
      });
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for mobile feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }
    </style>
